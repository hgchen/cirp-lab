{{- define "main" -}}

{{- $is_news := eq .Section "news" -}}

<article class="article{{ if $is_news }} news-article{{ end }}">

  {{ partial "page_header" . }}

  <div class="article-container">

    <div class="article-style">
      {{ .Content }}
    </div>

    {{ if not $is_news }}
      {{ partial "page_footer" . }}
    {{ end }}

  </div>
</article>

{{- end -}}
