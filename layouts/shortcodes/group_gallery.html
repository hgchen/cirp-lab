{{ $all := readDir "static/images" }}
{{ $groups := slice }}
{{ range $all }}
  {{ if and (not .IsDir) (hasPrefix .Name "group_") }}
    {{ $groups = $groups | append .Name }}
  {{ end }}
{{ end }}
{{ $groups = sort $groups }}

<div class="lab-gallery" data-lab-masonry>
  {{ range $idx, $name := $groups }}
    <figure class="lab-gallery-item">
      <img src="{{ (printf "images/%s" $name) | relURL }}" alt="{{ printf "CIRP group photo %d" (add $idx 1) }}" loading="lazy">
    </figure>
  {{ end }}
</div>

<script>
  (function () {
    const GAP = 14;

    function getCols(width) {
      if (width >= 1400) return 4;
      if (width >= 1024) return 3;
      if (width >= 640) return 2;
      return 1;
    }

    function layout(gallery) {
      const items = Array.from(gallery.querySelectorAll('.lab-gallery-item'));
      if (!items.length) return;

      const width = gallery.clientWidth;
      if (!width) return;

      const cols = getCols(width);
      const colWidth = (width - GAP * (cols - 1)) / cols;
      const heights = new Array(cols).fill(0);
      const rhythm = [1.25, 0.95, 1.1, 1.42, 0.88, 1.03, 1.18];

      items.forEach((item, idx) => {
        const img = item.querySelector('img');
        const nw = (img && img.naturalWidth) || 4;
        const nh = (img && img.naturalHeight) || 3;
        const baseRatio = nh / nw;
        const h = Math.max(170, colWidth * baseRatio * rhythm[idx % rhythm.length]);

        let col = 0;
        for (let i = 1; i < cols; i += 1) {
          if (heights[i] < heights[col]) col = i;
        }

        const x = col * (colWidth + GAP);
        const y = heights[col];

        item.style.width = colWidth + 'px';
        item.style.height = h + 'px';
        item.style.transform = `translate3d(${x}px, ${y}px, 0)`;

        heights[col] = y + h + GAP;
      });

      gallery.style.height = Math.max.apply(null, heights) - GAP + 'px';
    }

    function init(gallery) {
      let raf = null;
      const relayout = function () {
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(function () {
          layout(gallery);
        });
      };

      gallery.querySelectorAll('img').forEach(function (img) {
        if (!img.complete) {
          img.addEventListener('load', relayout, { once: true });
          img.addEventListener('error', relayout, { once: true });
        }
      });

      window.addEventListener('resize', relayout);
      relayout();
    }

    document.querySelectorAll('[data-lab-masonry]').forEach(init);
  })();
</script>
